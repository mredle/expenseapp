{# Bootstrap 5 pagination partial.
   Usage: {% include '_pager.html' %}
   Expects: prev_url, next_url, prev_label (optional), next_label (optional) #}
<nav aria-label="pagination">
    <ul class="pagination justify-content-center">
        <li class="page-item{% if not prev_url %} disabled{% endif %}">
            <a class="page-link" href="{{ prev_url or '#' }}" aria-label="{{ _('Previous') }}">
                <span aria-hidden="true">&larr;</span>
                {{ prev_label if prev_label is defined else _('Previous') }}
            </a>
        </li>
        <li class="page-item{% if not next_url %} disabled{% endif %}">
            <a class="page-link" href="{{ next_url or '#' }}" aria-label="{{ _('Next') }}">
                {{ next_label if next_label is defined else _('Next') }}
                <span aria-hidden="true">&rarr;</span>
            </a>
        </li>
    </ul>
</nav>
