{% extends "base.html" %}

{% block app_content %}
    <h1>{{ title }}</h1>
    {% if allow_new %}
    <a href="{{ url_for('main.new_currency') }}">{{ _('New Currency') }}</a>
    {% endif %}
    <br><br>
    {% for currency in currencies %}
        {% include '_currency.html' %}
    {% endfor %}
    <nav aria-label="pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item{% if not prev_url %} disabled{% endif %}">
                <a class="page-link" href="{{ prev_url or '#' }}">
                    <span aria-hidden="true">&larr;</span> {{ _('Previous currencies') }}
                </a>
            </li>
            <li class="page-item{% if not next_url %} disabled{% endif %}">
                <a class="page-link" href="{{ next_url or '#' }}">
                    {{ _('More currencies') }} <span aria-hidden="true">&rarr;</span>
                </a>
            </li>
        </ul>
    </nav>
{% endblock %}
