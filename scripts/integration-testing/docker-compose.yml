services:
  db:
    image: mariadb:latest
    container_name: expenseapp-db-dev
    command: ['--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping --silent']
      interval: 30s
      timeout: 10s
      retries: 4
    environment:
      MYSQL_ROOT_PASSWORD: pw
      MYSQL_USER: user
      MYSQL_PASSWORD: pw
      MYSQL_DATABASE: expenseapp
    networks:
     - expenseapp
    volumes:
     - type: volume
       source: mariadb-data
       target: /var/lib/mysql
       volume:
         nocopy: true

  adminer:
    image: adminer
    restart: on-failure
    container_name: expenseapp-adminer-dev
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
     - expenseapp
     
  phpredisadmin:
    image: erikdubbelboer/phpredisadmin
    restart: on-failure
    container_name: expenseapp-phpredisadmin-dev
    environment:
      REDIS_1_HOST: redis
      REDIS_1_NAME: redis
      REDIS_1_PORT: 6379
    depends_on:
      - redis
    ports:
      - "8081:80"
    networks:
     - expenseapp
     
  mailhog:
    image: mailhog/mailhog
    restart: on-failure
    container_name: expenseapp-mailhog-dev
    ports:
     - "8025:8025"
    environment:
      MH_UI_BIND_ADDR: 0.0.0.0:8025
      MH_SMTP_BIND_ADDR: 0.0.0.0:1025
      MH_STORAGE: memory
    networks:
     - expenseapp

  redis:
    image: redis:7-alpine
    restart: on-failure
    container_name: expenseapp-redis-dev
    command: '--requirepass pw'
    networks:
     - expenseapp
    volumes:
     - type: volume
       source: redis-data
       target: /data
       volume:
         nocopy: true

  minio:
    image: minio/minio
    container_name: expenseapp-minio-dev
    restart: on-failure
    ports:
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpw
    command: server /data --console-address ":9001"
    networks:
      - expenseapp
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    container_name: expenseapp-minio-init
    depends_on:
      - minio
    networks:
      - expenseapp
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadminpw;
      mc mb myminio/expenseapp-bucket;
      exit 0;
      "

  rq-worker:
    image: expenseapp:latest
    restart: on-failure
    entrypoint: rq
    command: ['worker', '-u', 'redis://:pw@redis:6379/0', 'expenseapp-tasks']
    container_name: expenseapp-rq-worker-dev
    environment:
      SECRET_KEY: 'you-will-never-guess'
      MYSQL_HOST: 'db'
      MYSQL_PORT: 3306
      MYSQL_USER: 'user'
      MYSQL_PW: 'pw'
      MYSQL_DB: 'expenseapp'
      MAIL_SERVER: 'mailhog'
      MAIL_PORT: '1025'
      MAIL_USE_TLS:
      MAIL_USERNAME: 'mailuser'
      MAIL_PASSWORD: 'mailpw'
      ADMIN_NOREPLY_SENDER: 'no-reply@expenseapp'
      ADMIN_USERNAME: 'admin'
      ADMIN_PASSWORD: 'pw'
      ADMIN_EMAIL: 'admin@expenseapp'
      REDIS_HOST: 'redis'
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: 'pw'
      STORAGE_DEFAULT_BACKEND: 's3'
      S3_BUCKET_NAME: 'expenseapp-bucket'
      S3_REGION: 'eu-central-1'
      AWS_ACCESS_KEY_ID: 'minioadmin'
      AWS_SECRET_ACCESS_KEY: 'minioadminpw'
      S3_ENDPOINT_URL: 'http://minio:9000'
    networks:
     - expenseapp
    depends_on:
     - db
     - redis
     - mailhog
     - minio
    volumes:
     - type: volume
       source: expenseapp-data
       target: /home/flask_app/app/static
       volume:
         nocopy: false
         
  expenseapp:
    image: expenseapp:latest
    restart: on-failure
    container_name: expenseapp-dev
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: 'you-will-never-guess'
      MYSQL_HOST: 'db'
      MYSQL_PORT: 3306
      MYSQL_USER: 'user'
      MYSQL_PW: 'pw'
      MYSQL_DB: 'expenseapp'
      MAIL_SERVER: 'mailhog'
      MAIL_PORT: '1025'
      MAIL_USE_TLS:
      MAIL_USERNAME: 'mailuser'
      MAIL_PASSWORD: 'mailpw'
      ADMIN_NOREPLY_SENDER: 'no-reply@expenseapp'
      ADMIN_USERNAME: 'admin'
      ADMIN_PASSWORD: 'pw'
      ADMIN_EMAIL: 'admin@expenseapp'
      REDIS_HOST: 'redis'
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: 'pw'
      STORAGE_DEFAULT_BACKEND: 's3'
      S3_BUCKET_NAME: 'expenseapp-bucket'
      S3_REGION: 'eu-central-1'
      AWS_ACCESS_KEY_ID: 'minioadmin'
      AWS_SECRET_ACCESS_KEY: 'minioadminpw'
      S3_ENDPOINT_URL: 'http://minio:9000'
    networks:
     - expenseapp
    depends_on:
     - rq-worker
     - db
     - redis
     - mailhog
     - minio
    volumes:
     - type: volume
       source: expenseapp-data
       target: /home/flask_app/app/static
       volume:
         nocopy: false
         
         
networks:
  expenseapp:
    driver: bridge
    name: expenseapp-dev

volumes:
  expenseapp-data:
    driver: local
    external: false
    name: expenseapp-data
  mariadb-data:
    driver: local
    external: false
    name: expenseapp-mariadb-data
  redis-data:
    driver: local
    external: false
    name: expenseapp-redis-data
  minio-data:
    driver: local
    external: false
    name: expenseapp-minio-data
