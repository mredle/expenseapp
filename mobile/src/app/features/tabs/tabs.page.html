<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="events">
      <ion-icon name="calendar"></ion-icon>
      <ion-label>Events</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="currencies">
      <ion-icon name="cash"></ion-icon>
      <ion-label>Currencies</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="users">
      <ion-icon name="people"></ion-icon>
      <ion-label>Users</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="messages">
      <ion-icon name="chatbubbles"></ion-icon>
      <ion-label>Messages</ion-label>
      <ion-badge *ngIf="(unreadCount$ | async) as count" color="danger">{{ count }}</ion-badge>
    </ion-tab-button>
    <ion-tab-button tab="profile">
      <ion-icon name="person"></ion-icon>
      <ion-label>Profile</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
