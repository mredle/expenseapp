<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Currencies</ion-title>
    <ion-buttons slot="end">
      <ion-button *ngIf="isAdmin && !showForm" (click)="startAdd()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="load()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Add / Edit form -->
  <ion-card *ngIf="showForm">
    <ion-card-header>
      <ion-card-title>{{ editingGuid ? 'Edit Currency' : 'New Currency' }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <ion-item>
          <ion-label position="stacked">Code *</ion-label>
          <ion-input formControlName="code" placeholder="e.g. USD"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Name *</ion-label>
          <ion-input formControlName="name" placeholder="US Dollar"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">ISO Number</ion-label>
          <ion-input formControlName="number" type="number"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Exponent (decimal places)</ion-label>
          <ion-input formControlName="exponent" type="number"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Rate in CHF *</ion-label>
          <ion-input formControlName="inCHF" type="number" step="0.0001"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Description</ion-label>
          <ion-input formControlName="description"></ion-input>
        </ion-item>
        <div class="ion-padding-top">
          <ion-button type="submit" expand="block" [disabled]="form.invalid">Save</ion-button>
          <ion-button fill="clear" expand="block" (click)="cancelForm()">Cancel</ion-button>
        </div>
      </form>
    </ion-card-content>
  </ion-card>

  <div *ngIf="loading" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
  </div>

  <ion-list *ngIf="!loading && !showForm">
    <ion-item *ngFor="let c of currencies" button (click)="isAdmin && startEdit(c)">
      <ion-label>
        <h2><strong>{{ c.code }}</strong> – {{ c.name }}</h2>
        <p>Rate: {{ c.inCHF }} CHF&nbsp;&nbsp;|&nbsp;&nbsp;Exponent: {{ c.exponent }}</p>
      </ion-label>
      <ion-note slot="end" *ngIf="isAdmin">
        <ion-icon name="pencil-outline"></ion-icon>
      </ion-note>
    </ion-item>
    <ion-item *ngIf="currencies.length === 0">
      <ion-label color="medium" class="ion-text-center">No currencies found.</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
